<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Shame Project - User Reviews</title>
    <!-- Google Fonts & Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #5a4d4d;        /* Muted dark brownish */
            --secondary-color: #8c7c7c;      /* Soft greyish brown */
            --accent-color: #e2c4b6;         /* Nude pink */
            --light-color: #fdf6f2;          /* Very light nude */
            --button-gradient-start: #e2c4b6;
            --button-gradient-end: #d8b8a3;
        }
        
        body {
           font-family: 'Playfair Display', serif;
            background: linear-gradient(160deg, #f8f4f2 0%, #f0e8e5 100%);
           color: var(--primary-color);
           margin: 0;
           padding: 0;
           text-align: center;
        }
        
        header {
            background: var(--primary-color);
            color: var(--light-color);
            text-align: center;
            padding: 25px 0;
            border-bottom: 3px solid var(--accent-color);
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            margin-bottom: 12px;
            letter-spacing: 4px;
            font-weight: 700;
        }
        
        .nav-button {
            color: #fff !important;
            margin: 0 15px;
            font-weight: 500;
            background: var(--primary-color);
            padding: 12px 28px;
            border-radius: 25px;
            transition: all 0.2s;
            box-shadow: 0 3px 15px rgba(191,161,100,0.25);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: inline-block;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .nav-button:hover {
            background: #fff !important;
            color: var(--secondary-color) !important;
            text-decoration: none;
            box-shadow: 0 5px 20px rgba(191,161,100,0.5);
            transform: translateY(-2px);
        }
        
        main {
            background: #fff;
            max-width: 1000px;
            margin: 50px auto;
            border-radius: 16px;
            padding: 48px 42px;
            box-shadow: 0 0 30px 6px rgba(191,161,100,0.15);
            position: relative;
            overflow: hidden;
        }
        
        main::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }
        
        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: var(--secondary-color);
            text-align: center;
        }
        
        .review-container {
            background: var(--light-color);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        form textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--primary-color);
            border-radius: 10px;
            background: #fff;
            font-size: 1rem;
            transition: all 0.3s;
            resize: vertical;
            min-height: 150px;
            font-family: 'Roboto', sans-serif;
        }
        
        form textarea:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(191, 161, 100, 0.3);
        }
        
        form button {
            background-color: var(--primary-color);
            color: #fff;
            font-weight: 700;
            padding: 14px 40px;
            border-radius: 35px;
            border: none;
            margin-top: 20px;
            letter-spacing: 3px;
            transition: all 0.3s;
            font-size: 1.15rem;
            cursor: pointer;
            display: block;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 15px rgba(191, 161, 100, 0.3);
        }
        
        form button:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(191, 161, 100, 0.4);
        }
        
        .reviews-section {
            margin-top: 50px;
        }
        
        .reviews-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--light-color);
            padding-bottom: 15px;
        }
        
        .reviews-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--secondary-color);
            margin: 0;
        }
        
        .review-card {
            background: #fff;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            border-left: 4px solid var(--primary-color);
            transition: transform 0.3s;
        }
        
        .review-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .reviewer-name {
            font-weight: 600;
            color: var(--dark-color);
            font-size: 1.1rem;
        }
        
        .review-date {
            color: #777;
            font-size: 0.9rem;
        }
        
        .review-content {
            line-height: 1.6;
            color: #444;
        }
        
        .review-rating {
            color: var(--primary-color);
            margin-top: 10px;
        }
        
        .processing-status {
            background: #e8f5e8;
            border: 1px solid #4caf50;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            display: none;
        }
        
        .processing-status.processing {
            background: #fff3e0;
            border-color: #ff9800;
        }
        
        .processing-status.success {
            background: #e8f5e8;
            border-color: #4caf50;
        }
        
        .processing-status.error {
            background: #ffebee;
            border-color: #f44336;
        }
        
        .status-icon {
            margin-right: 10px;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.8rem;
            }
            
            h2 {
                font-size: 2.2rem;
            }
            
            .nav-button {
                display: block;
                margin: 10px auto;
                width: 80%;
                max-width: 250px;
            }
            
            main {
                margin: 30px 15px;
                padding: 30px 20px;
            }
            
            .review-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .review-date {
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Luxury Shame Project</h1>
        <nav>
            <a href="/" class="nav-button">HOME</a>
            <a href="metrics" class="nav-button">FEELINGS METRICS</a>
            <a href="advice" class="nav-button">PERSONAL ADVICE</a>
            <a href="reviews" class="nav-button">USER REVIEWS</a>
        </nav>
    </header>

    <main>
        <h2>Share Your Luxury Experience</h2>
        
        <div class="review-container">
            <form id="reviewForm" method="post">
                <textarea name="review" id="reviewText" rows="4" placeholder="Share your thoughts on luxury purchases, emotional experiences, or any feelings of 'luxury shame'..."></textarea>
                
                <div id="processingStatus" class="processing-status">
                    <span class="status-icon"></span>
                    <span id="statusMessage">Processing your review...</span>
                </div>
                
                <button type="submit" id="submitButton">
                    <i class="fas fa-paper-plane"></i> Submit Review
                </button>
            </form>
        </div>
        
        <div class="reviews-section">
            <div class="reviews-header">
                <h3 class="reviews-title">Community Reviews</h3>
                <span class="review-count" id="reviewCount">Loading reviews...</span>
            </div>
            
            <div class="reviews-list" id="reviewsList">
                <!-- Reviews will be loaded dynamically -->
                <div class="empty-reviews">
                    <i class="fas fa-comments"></i>
                    <h3>Loading reviews...</h3>
                    <p>Please wait while we load community experiences</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Update review count and load existing reviews
        async function loadReviews() {
            try {
                const response = await fetch('/api/reviews');
                const reviews = await response.json();
                
                const reviewsList = document.getElementById('reviewsList');
                const reviewCount = document.getElementById('reviewCount');
                
                if (reviews.length === 0) {
                    reviewsList.innerHTML = `
                        <div class="empty-reviews">
                            <i class="fas fa-comments"></i>
                            <h3>No Reviews Yet</h3>
                            <p>Be the first to share your luxury experience!</p>
                        </div>
                    `;
                    reviewCount.textContent = '0 Reviews';
                    return;
                }
                
                reviewCount.textContent = `${reviews.length} Review${reviews.length !== 1 ? 's' : ''}`;
                
                reviewsList.innerHTML = reviews.map(review => `
                    <div class="review-card">
                        <div class="review-header">
                            <div class="reviewer-name">${review.username || 'Anonymous User'}</div>
                            <div class="review-date">${new Date(review.timestamp).toLocaleDateString()}</div>
                        </div>
                        <div class="review-content">${review.content}</div>
                        <div class="review-rating">
                            ${'<i class="fas fa-star"></i>'.repeat(review.rating || 5)}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading reviews:', error);
                document.getElementById('reviewsList').innerHTML = `
                    <div class="empty-reviews">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Reviews</h3>
                        <p>Please try refreshing the page</p>
                    </div>
                `;
            }
        }

        // Handle form submission
        document.getElementById('reviewForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const textarea = document.getElementById('reviewText');
            const button = document.getElementById('submitButton');
            const statusDiv = document.getElementById('processingStatus');
            const statusMessage = document.getElementById('statusMessage');
            
            if (textarea.value.trim() === '') {
                showStatus('error', 'Please share your thoughts before submitting.');
                return;
            }
            
            // Show loading state
            const originalText = button.innerHTML;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            button.disabled = true;
            
            showStatus('processing', 'Submitting your review...');
            
            try {
                // Submit review to backend
                const response = await fetch('/api/submit-review', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        review: textarea.value.trim()
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('success', 'Review submitted successfully! Processing embeddings...');
                    
                    // Wait a moment then reload reviews
                    setTimeout(() => {
                        loadReviews();
                        textarea.value = '';
                        hideStatus();
                    }, 2000);
                    
                } else {
                    throw new Error(result.error || 'Failed to submit review');
                }
                
            } catch (error) {
                console.error('Error submitting review:', error);
                showStatus('error', `Error: ${error.message}`);
            } finally {
                button.innerHTML = originalText;
                button.disabled = false;
                
                // Auto-hide status after 5 seconds for errors
                if (statusDiv.classList.contains('error')) {
                    setTimeout(hideStatus, 5000);
                }
            }
        });

        // Status display functions
        function showStatus(type, message) {
            const statusDiv = document.getElementById('processingStatus');
            const statusMessage = document.getElementById('statusMessage');
            const statusIcon = statusDiv.querySelector('.status-icon');
            
            statusDiv.className = `processing-status ${type}`;
            statusMessage.textContent = message;
            
            // Set appropriate icon
            statusIcon.className = 'status-icon';
            if (type === 'processing') {
                statusIcon.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            } else if (type === 'success') {
                statusIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
            } else if (type === 'error') {
                statusIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
            }
            
            statusDiv.style.display = 'block';
        }

        function hideStatus() {
            document.getElementById('processingStatus').style.display = 'none';
        }

        // Load reviews when page loads
        document.addEventListener('DOMContentLoaded', loadReviews);
    </script>
</body>
</html>
