<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Luxury Shame Project - Home</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --primary-color: #5a4d4d;
  --secondary-color: #8c7c7c;
  --accent-color: #e2c4b6;
  --light-color: #fdf6f2;
  --button-gradient-start: #e2c4b6;
  --button-gradient-end: #d8b8a3;
}

body {
  font-family: 'Playfair Display', serif;
  background: linear-gradient(160deg, #f8f4f2 0%, #f0e8e5 100%);
  color: var(--primary-color);
  margin: 0;
  padding: 0;
  text-align: center;
}

header {
  background-color: var(--primary-color);
  color: var(--light-color);
  padding: 20px;
  font-size: 1.8em;
  font-weight: bold;
  letter-spacing: 2px;
}

nav {
  margin: 15px 0 30px 0;
}

nav a {
  color: var(--primary-color);
  margin: 0 15px;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.3s;
}

nav a:hover {
  color: var(--accent-color);
}

.container {
  background-color: var(--light-color);
  border-radius: 20px;
  padding: 30px;
  margin: 30px auto;
  width: 80%;
  max-width: 800px;
  box-shadow: 0 0 20px rgba(90,77,77,0.15);
}

h2 {
  color: var(--secondary-color);
  margin-bottom: 15px;
}

.tabs {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}

.tab {
  padding: 10px 20px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--primary-color);
  transition: 0.3s;
}

.tab.active {
  border-bottom: 2px solid var(--accent-color);
  color: var(--accent-color);
  font-weight: bold;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

textarea, input[type="text"], input[type="file"] {
  width: 90%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid var(--secondary-color);
  font-family: 'Roboto', sans-serif;
  resize: none;
  background-color: #fff7f2;
  color: var(--primary-color);
  transition: all 0.3s;
}

textarea:focus, input[type="text"]:focus {
  outline: none;
  border-color: var(--accent-color);
  box-shadow: 0 0 8px rgba(226,196,182,0.5);
}

button {
  background: linear-gradient(135deg, var(--button-gradient-start), var(--button-gradient-end));
  color: var(--primary-color);
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
  margin-top: 20px;
  box-shadow: 0 5px 15px rgba(226,196,182,0.3);
}

button:hover {
  background: linear-gradient(135deg, #d8b8a3, #e9c9b5);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(226,196,182,0.5);
}

.result-card {
  margin-top: 30px;
  background-color: #fff0eb;
  border-radius: 15px;
  padding: 20px;
  text-align: left;
  color: var(--primary-color);
  box-shadow: 0 0 10px rgba(90,77,77,0.15);
  animation: fadeIn 0.5s ease-in;
}

.result-title {
  color: var(--accent-color);
  font-size: 1.3em;
  margin-bottom: 10px;
  border-bottom: 1px solid var(--accent-color);
  padding-bottom: 5px;
}

.results-container {
  background: #fdf2ee;
  border-radius: 10px;
  padding: 15px;
  margin-top: 15px;
}

.local-reviews ul {
  list-style-type: none;
  padding-left: 0;
}

.local-reviews li {
  background: #fff5f0;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border-left: 4px solid var(--accent-color);
}

.error-message {
  background: #ffe6e3;
  color: #a33;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #e07a70;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.loading {
  text-align: center;
  padding: 20px;
}

.loading-spinner {
  border: 4px solid rgba(226,196,182,0.3);
  border-radius: 50%;
  border-top: 4px solid var(--accent-color);
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 0 auto 15px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ✅ Sentiment Summary Styling */
.sentiment-summary {
  background: #fff7f5;
  border-radius: 10px;
  padding: 15px;
  margin-top: 15px;
  border-left: 4px solid var(--accent-color);
}
.sentiment-summary h4 {
  color: var(--accent-color);
}
.sentiment-summary p {
  margin: 5px 0;
}
</style>
</head>
<body>
<header>Luxury Shame Analysis</header>
<nav>
  <a href="/">Home</a>
  <a href="/metrics">Feelings Metrics</a>
  <a href="/advice">Personal Advice</a>
  <a href="/reviews">User Reviews</a>  
</nav>

<div class="container">
  <h2>Experience Emotional AI Analysis</h2>
  <p>Upload your product image or describe it to get emotion-based insights and advice.</p>

  <div class="tabs">
    <div class="tab active" id="describe-tab">Describe Product</div>
    <div class="tab" id="upload-tab">Upload Image</div>
  </div>

  <div class="tab-content active" id="describe-content">
    <input type="text" id="product-name" placeholder="Product Name (Optional)"><br>
    <textarea id="product-desc" rows="4" placeholder="Describe your product..."></textarea><br>
    <button onclick="submitDescription()">Submit for Analysis</button>
  </div>

  <div class="tab-content" id="upload-content">
    <input type="file" id="image-input" accept="image/*"><br>
    <button onclick="submitImage()">Upload and Analyze</button>
  </div>

  <div id="analysis-result"></div>
</div>

<script>
const describeTab = document.getElementById('describe-tab');
const uploadTab = document.getElementById('upload-tab');
const describeContent = document.getElementById('describe-content');
const uploadContent = document.getElementById('upload-content');
const resultDiv = document.getElementById('analysis-result');

describeTab.onclick = () => {
  describeTab.classList.add('active');
  uploadTab.classList.remove('active');
  describeContent.classList.add('active');
  uploadContent.classList.remove('active');
};

uploadTab.onclick = () => {
  uploadTab.classList.add('active');
  describeTab.classList.remove('active');
  uploadContent.classList.add('active');
  describeContent.classList.remove('active');
};

async function submitDescription() {
  const name = document.getElementById('product-name').value;
  const desc = document.getElementById('product-desc').value;
  if (!desc.trim()) { alert('Please enter a product description.'); return; }

  resultDiv.innerHTML = `
    <div class="result-card">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div class="result-title">Analyzing...</div>
        <p>Please wait while AI processes your input.</p>
      </div>
    </div>
  `;

  try {
    const formData = new FormData();
    formData.append('mode', 'text');
    formData.append('description', desc);
    if (name) formData.append('name', name);

    const response = await fetch('/api/analyze', { method: 'POST', body: formData });
    const data = await response.json();

    if (data.success) displayResults(data);
    else showError(data.error || 'Unknown error occurred');
  } catch (error) { showError('Network error: ' + error.message); }
}

async function submitImage() {
  const fileInput = document.getElementById('image-input');
  const file = fileInput.files[0];
  if (!file) { alert('Please select an image to upload.'); return; }

  resultDiv.innerHTML = `
    <div class="result-card">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div class="result-title">Analyzing Image...</div>
        <p>Uploading and analyzing image...</p>
      </div>
    </div>
  `;

  try {
    const formData = new FormData();
    formData.append('mode', 'image');
    formData.append('file', file);

    const response = await fetch('/api/analyze', { method: 'POST', body: formData });
    const data = await response.json();

    if (data.success) displayResults(data);
    else showError(data.error || 'Unknown error occurred');
  } catch (error) { showError('Network error: ' + error.message); }
}

function displayResults(result) {
  let html = `
    <div class="result-card">
      <div class="result-title">✨ Analysis Result ✨</div>
      <div class="results-container">
        <div class="product-summary">
          <h4>📋 Product Analysis:</h4>
          <p>${result.product_text || 'No product analysis available.'}</p>
        </div>
  `;

  // 📝 Local Reviews Section
  if (result.local_reviews && result.local_reviews.length > 0) {
    html += `<div class="local-reviews"><h4>📝 Relevant Reviews (${result.local_reviews.length}):</h4><ul>`;
    result.local_reviews.forEach(review => {
      const reviewText = typeof review === 'string' ? review : (review.content || JSON.stringify(review));
      html += `<li>${reviewText}</li>`;
    });
    html += `</ul></div>`;
  } else {
    html += `<div class="local-reviews"><h4>📝 Relevant Reviews:</h4><p>No similar reviews found in our database.</p></div>`;
  }

  // 💬 Sentiment Summary Section (Plain Text)
  if (result.sentiment_summary && result.sentiment_summary.trim() !== "") {
    html += `
      <div class="sentiment-summary">
        <h4>💬 Sentiment Summary:</h4>
        <p style="white-space: pre-line; margin-top: 8px;">${result.sentiment_summary}</p>
      </div>
    `;
  }

  html += `</div></div>`;
  resultDiv.innerHTML = html;
}

function showError(message) {
  resultDiv.innerHTML = `
    <div class="result-card">
      <div class="error-message">
        <div class="result-title">❌ Error</div>
        <p>${message}</p>
      </div>
    </div>
  `;
}

document.getElementById('product-desc').addEventListener('keypress', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) submitDescription();
});
</script>
</body>
</html>
